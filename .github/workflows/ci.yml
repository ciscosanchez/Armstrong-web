name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Type check + lint ────────────────────────────────────
  lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  # ── 2. Playwright E2E tests ─────────────────────────────────
  e2e:
    name: Playwright Tests
    runs-on: ubuntu-latest
    env:
      # Minimal env so Next.js builds without crashing
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armstrong_test
      AUTH_SECRET: ci-secret-not-real-just-for-build
      AUTH_TRUST_HOST: 'true'
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: production
      SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
      NEXT_PUBLIC_GA4_MEASUREMENT_ID: G-PLACEHOLDER
      # Turnstile — omitting keys triggers dev-bypass in TurnstileWidget
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ''
      TURNSTILE_SECRET_KEY: ''
      # Sentry — disabled in CI (no DSN = no reporting)
      NEXT_PUBLIC_SENTRY_DSN: ''
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: armstrong_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up database schema
        run: npm run db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armstrong_test

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (Chromium only in CI)
        run: npm test -- --project=chromium

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
